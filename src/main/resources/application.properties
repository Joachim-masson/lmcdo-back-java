#Global configuration
spring.application.name=lmcdoBack

#Tomcat configuration
server.port=9000

#Log level configuration
logging.level.root=error
logging.level.com.lmcdoBack=info
logging.level.org.springframework.boot.autoconfigure.jdbc=info
logging.level.org.springframework.boot.web.embedded.tomcat=info 

# 1. URL de connexion à la base de données (Remplace "nom_de_ta_bdd" par le vrai nom de ta base)
spring.datasource.url=jdbc:mysql://localhost:3306/lmcdo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# 2. Identifiants de connexion (À adapter selon ta configuration MySQL)
spring.datasource.username=root
spring.datasource.password=password

# 3. Stratégie de génération des tables par Hibernate (JPA)
# 'update' permet à Spring de créer ou modifier automatiquement les tables si elles n'existent pas
spring.jpa.hibernate.ddl-auto=update

# 4. (Optionnel mais recommandé) Affiche les requêtes SQL générées par Spring dans la console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true